<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found | Nameer P K</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="npk Portfolio" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <nav>
      <div class="container">
        <a href="/" class="logo">NPK</a>
        <div class="nav-links">
          <a href="/#about">About</a>
          <a href="/#experience">Experience</a>
          <a href="/#projects">Projects</a>
          <a href="/#skills">Skills</a>
          <a href="/#contact">Contact</a>
        </div>
        <div class="hamburger">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </nav>

    <section class="hero">
      <div class="container">
        <div class="hero-content error-hero">
          <p class="error-code">404</p>
          <h1 class="hero-title">Page not found</h1>
          <p class="hero-description">
            The page you are looking for does not exist or has been moved. If
            you followed a link here, it may be outdated—you can head back to
            the homepage and continue from there.
          </p>
          <a href="/" class="cta-button">Back to home</a>
        </div>
      </div>
    </section>

    <footer>
      <div class="social-links">
        <a
          href="https://github.com/nameer"
          class="social-link"
          aria-label="GitHub"
        >
          <i class="fab fa-github"></i>
        </a>
        <a
          href="https://linkedin.com/in/pknameer"
          class="social-link"
          aria-label="LinkedIn"
        >
          <i class="fab fa-linkedin"></i>
        </a>
      </div>
      <p>Built with ❤️ by Nameer P K</p>
    </footer>

    <script>
      (function () {
        var hamburger = document.querySelector(".hamburger");
        var navLinks = document.querySelector(".nav-links");
        var navLinksItems = document.querySelectorAll(".nav-links a");
        if (!hamburger || !navLinks) return;
        hamburger.addEventListener("click", function () {
          navLinks.classList.toggle("active");
          hamburger.innerHTML = navLinks.classList.contains("active")
            ? '<i class="fas fa-times"></i>'
            : '<i class="fas fa-bars"></i>';
        });
        navLinksItems.forEach(function (item) {
          item.addEventListener("click", function () {
            navLinks.classList.remove("active");
            hamburger.innerHTML = '<i class="fas fa-bars"></i>';
          });
        });
      })();
    </script>
  </body>
</html>
